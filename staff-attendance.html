<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Attendance & Payroll</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --paper:#FAF7F1;
    --paper-raised:#FFFFFF;
    --ink:#1C2541;
    --ink-soft:#5B6478;
    --ink-faint:#A3A8B5;
    --line:#E8E2D6;
    --line-soft:#F0EBE0;
    --teal:#0F766E;
    --teal-bg:#E6F4F2;
    --teal-deep:#0B5C56;
    --amber:#C2740A;
    --amber-bg:#FBF0DD;
    --rose:#C81E4E;
    --rose-bg:#FBE6EC;
    --violet:#6D4FC2;
    --violet-bg:#EFEAFB;
    --blue:#2563A8;
    --blue-bg:#E5EFF9;
    --gold-leaf:#B8923F;
  }
  body{background:var(--paper);color:var(--ink);font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{height:5px;width:5px}
  ::-webkit-scrollbar-track{background:var(--line-soft)}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .mono{font-family:'JetBrains Mono',monospace}
  .serif{font-family:'Fraunces',serif}
  .header{background:var(--paper-raised);border-bottom:1px solid var(--line);padding:18px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(28,37,65,0.02)}
  .header-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(150deg,var(--teal) 0%, var(--teal-deep) 100%);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 6px rgba(15,118,110,0.25)}
  .header-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ink);letter-spacing:-0.2px;line-height:1.1}
  .header-sub{font-size:11px;color:var(--ink-faint);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.01em}
  .month-nav{background:var(--paper-raised);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
  .nav-btn{background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);border-radius:9px;padding:8px 16px;cursor:pointer;font-size:17px;transition:all 0.15s;line-height:1}
  .nav-btn:active{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-deep)}
  .month-label{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink);letter-spacing:0.01em}
  .tabs{background:var(--paper-raised);border-bottom:1px solid var(--line);display:flex;padding:0 10px}
  .tab{flex:1;background:transparent;border:none;color:var(--ink-faint);cursor:pointer;padding:13px 8px;font-size:13px;font-weight:600;border-bottom:2.5px solid transparent;transition:all 0.15s;font-family:'Inter',sans-serif;letter-spacing:0.01em}
  .tab.active{color:var(--teal-deep);border-bottom-color:var(--teal)}
  .btn-primary{background:var(--teal);border:none;color:white;border-radius:10px;padding:11px 18px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;transition:all 0.15s;width:100%;box-shadow:0 2px 8px rgba(15,118,110,0.25)}
  .btn-primary:active{background:var(--teal-deep);transform:scale(0.98)}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:10px;padding:11px 18px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;width:100%;transition:all 0.15s}
  .btn-ghost:active{background:var(--line-soft)}
  .btn-action{background:var(--paper-raised);border:1.5px solid var(--line);color:var(--ink-soft);border-radius:9px;padding:7px 13px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;transition:all 0.15s}
  .btn-action:active{background:var(--line-soft)}
  .btn-icon{background:transparent;border:none;cursor:pointer;padding:5px 7px;border-radius:7px;font-size:13px;opacity:0.55;transition:all 0.15s}
  .btn-icon:active{opacity:1;background:var(--line-soft)}
  .header-add{background:var(--ink);color:white;border:none;border-radius:9px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
  .header-add:active{background:var(--teal-deep)}
  .input{background:var(--paper);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;padding:12px 14px;font-size:15px;font-family:'Inter',sans-serif;outline:none;width:100%;-webkit-appearance:none;transition:border-color 0.15s}
  .input:focus{border-color:var(--teal)}
  .label{font-size:11px;color:var(--ink-faint);font-weight:700;display:block;margin-bottom:7px;letter-spacing:0.07em;text-transform:uppercase}
  .card{background:var(--paper-raised);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(28,37,65,0.04)}
  .att-cell{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;user-select:none;font-family:'JetBrains Mono',monospace;transition:transform 0.1s;-webkit-tap-highlight-color:transparent}
  .att-cell:active{transform:scale(0.88)}
  .hr-cell{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;user-select:none;font-family:'JetBrains Mono',monospace;-webkit-tap-highlight-color:transparent;border:1.5px dashed var(--line)}
  .modal-overlay{position:fixed;inset:0;background:rgba(28,37,65,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0;backdrop-filter:blur(2px)}
  .modal{background:var(--paper-raised);border-top:1px solid var(--line);border-radius:24px 24px 0 0;padding:26px 20px 38px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(28,37,65,0.12)}
  .modal-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .modal-sub{font-size:13px;color:var(--ink-faint);margin-bottom:22px;font-family:'JetBrains Mono',monospace}
  .section-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
  .divider{border:none;border-top:1px solid var(--line-soft);margin:16px 0}
  .pay-badge{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;background:var(--teal-bg);border:1px solid rgba(15,118,110,0.15);border-radius:7px;padding:4px 10px;color:var(--teal-deep)}
  .save-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;transition:all 0.3s;color:var(--teal-deep)}
  .save-dot{width:6px;height:6px;border-radius:50%}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;border:1px solid var(--line)}
  table{border-collapse:collapse;width:100%}
  th,td{white-space:nowrap}
  .balance-paid{background:var(--teal-bg);border:1px solid rgba(15,118,110,0.2);border-radius:14px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
  .balance-owed{background:var(--amber-bg);border:1px solid rgba(194,116,10,0.25);border-radius:14px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
  .carry-banner{background:var(--violet-bg);border:1px solid rgba(109,79,194,0.22);border-radius:14px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .empty{text-align:center;padding:56px 20px;color:var(--ink-faint)}
  .empty-icon{font-size:38px;margin-bottom:12px;opacity:0.6}
  .empty-text{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink-soft)}
  .empty-sub{font-size:13px;margin-top:7px}
  .type-toggle{display:flex;gap:8px}
  .type-btn{flex:1;background:var(--paper);border:1.5px solid var(--line);color:var(--ink-soft);border-radius:10px;padding:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;text-align:center;transition:all 0.15s}
  .type-btn.active{background:var(--ink);border-color:var(--ink);color:white}
  .type-pill{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:0.04em;text-transform:uppercase}
  .summary-stat{background:var(--paper-raised);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:0 1px 3px rgba(28,37,65,0.03)}
  .summary-stat-label{font-size:10px;color:var(--ink-faint);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px}
  .summary-stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
  .emp-row-name{font-size:13px;font-weight:700;color:var(--ink)}
  .emp-row-rate{font-size:11px;color:var(--ink-faint);font-family:'JetBrains Mono',monospace;margin-top:2px}
  .chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;font-family:'JetBrains Mono',monospace}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--ink-faint)}
  .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div><div style="font-family:'JetBrains Mono',monospace;font-size:13px">Loading from database…</div></div></div>
<script>
// ── Supabase ─────────────────────────────────────────────────────────────────
const SB_URL = 'https://qibdsiirzhfkpkyznfys.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpYmRzaWlyemhma3BreXpuZnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYyMDgsImV4cCI6MjA5MjI2MjIwOH0.ikrSP2efW_6e7BZdcdqvfKtZrswvt8hlF8F4gcPknpg';
const SB_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };

async function dbLoad() {
  const r = await fetch(`${SB_URL}/rest/v1/ftm_attendance?id=eq.state&select=data`, { headers: SB_HDRS });
  const rows = await r.json();
  return (rows && rows[0] && rows[0].data) ? rows[0].data : null;
}

async function dbSave(data) {
  return fetch(`${SB_URL}/rest/v1/ftm_attendance`, {
    method: 'POST', headers: SB_HDRS,
    body: JSON.stringify({ id: 'state', data, updated_at: new Date().toISOString() })
  });
}

// ── App ───────────────────────────────────────────────────────────────────────
const DEFAULT_EMPLOYEES = [{ name: 'Kerry', rate: 55, payType: 'daily' }];
const STATUS = {
  P:  { label:'Present',  color:'#0F766E', bg:'#E6F4F2', short:'P', mult:1   },
  H:  { label:'Half Day', color:'#C2740A', bg:'#FBF0DD', short:'H', mult:0.5 },
  L:  { label:'Leave',    color:'#6D4FC2', bg:'#EFEAFB', short:'L', mult:0   },
  A:  { label:'Absent',   color:'#C81E4E', bg:'#FBE6EC', short:'A', mult:0   },
  '-':{ label:'—',        color:'#C9C2B2', bg:'transparent', short:'—', mult:0 },
};
const CYCLE = ['P','H','L','A','-'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SMONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DNAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const daysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const fmt = n => '£' + Number(n).toFixed(2);
const fmtDate = iso => { if(!iso) return ''; const d=new Date(iso); return `${d.getDate()} ${SMONTHS[d.getMonth()]} ${d.getFullYear()}`; };

let state = {
  employees: DEFAULT_EMPLOYEES,
  attendance: {},
  hours: {},
  commissions: {},
  payments: {},
  carryForward: {},
  carryHandled: {},
};
const today = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth();
let curView  = 'attendance';
let saveTimer = null;
let syncStatus = 'synced'; // 'synced' | 'saving' | 'error'
let modal = null;
let modalData = {};
let addPayType = 'daily';
let editPayType = 'daily';

async function loadState() {
  try {
    const data = await dbLoad();
    const blank = {employees:DEFAULT_EMPLOYEES,attendance:{},hours:{},commissions:{},payments:{},carryForward:{},carryHandled:{}};
    if (data) {
      state = Object.assign({}, blank, data);
    }
    if (!state.hours) state.hours = {};
    state.employees = state.employees.map(e => ({ name:e.name, rate:e.rate, payType: e.payType==='hourly' ? 'hourly' : 'daily' }));
    if (!state.employees.find(e => e.name === 'Kerry')) state.employees.unshift({ name: 'Kerry', rate: 55, payType:'daily' });
  } catch(e) {
    console.error('Load error', e);
  }
}

function saveState() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const r = await dbSave({ ...state });
      setSyncStatus(r.ok ? 'synced' : 'error');
    } catch(e) {
      setSyncStatus('error');
    }
  }, 800);
}

function setSyncStatus(s) {
  syncStatus = s;
  const pill = document.getElementById('save-pill');
  const dot  = document.getElementById('save-dot');
  if (!pill || !dot) return;
  if (s === 'saving') {
    dot.style.background = '#C2740A';
    pill.style.color = '#C2740A';
    pill.innerHTML = '<span id="save-dot" style="width:6px;height:6px;border-radius:50%;background:#C2740A;display:inline-block"></span>&nbsp;SAVING…';
  } else if (s === 'error') {
    dot.style.background = '#C81E4E';
    pill.style.color = '#C81E4E';
    pill.innerHTML = '<span id="save-dot" style="width:6px;height:6px;border-radius:50%;background:#C81E4E;display:inline-block"></span>&nbsp;ERROR';
  } else {
    pill.style.color = 'var(--teal-deep)';
    pill.innerHTML = '<span id="save-dot" style="width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block"></span>&nbsp;SYNCED';
  }
}

const aKey = (name,d) => `${name}__${curYear}-${curMonth}-${d}`;
const mKey = (name,y=curYear,m=curMonth) => `${name}__${y}-${m}`;
const getAtt   = (name,d)  => state.attendance[aKey(name,d)] || '-';
const getHours = (name,d)  => state.hours[aKey(name,d)] !== undefined ? state.hours[aKey(name,d)] : 0;
const getComms = (name,y=curYear,m=curMonth) => state.commissions[mKey(name,y,m)] || [];
const getPays  = (name,y=curYear,m=curMonth) => state.payments[mKey(name,y,m)] || [];
const getCarry = (name,y=curYear,m=curMonth) => state.carryForward[mKey(name,y,m)] || [];
const totalComm= (name,y=curYear,m=curMonth) => getComms(name,y,m).reduce((s,c)=>s+parseFloat(c.amount||0),0);
const totalPaid= (name,y=curYear,m=curMonth) => getPays(name,y,m).reduce((s,p)=>s+parseFloat(p.amount||0),0);
const totalCarry=(name,y=curYear,m=curMonth) => getCarry(name,y,m).reduce((s,c)=>s+parseFloat(c.amount||0),0);
function getEmp(name) { return state.employees.find(e=>e.name===name); }
function isHourly(name) { const e=getEmp(name); return e && e.payType==='hourly'; }
function prevMonthYM(y,m) { return m===0 ? {y:y-1,m:11} : {y, m:m-1}; }
function cycleAtt(name,d) {
  const cur = getAtt(name,d);
  const next = CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
  state.attendance[aKey(name,d)] = next;
  saveState(); render();
}
function promptHours(name,d) {
  modal='hours'; modalData={emp:name, day:d};
  render();
  setTimeout(()=>{ const el=document.getElementById('m-hours'); if(el){ el.focus(); el.select(); } },100);
}
function saveHours() {
  const el = document.getElementById('m-hours');
  const val = el.value;
  const name = modalData.emp, d = modalData.day;
  if (val === '' || val === null) { delete state.hours[aKey(name,d)]; saveState(); closeModal(); return; }
  const num = parseFloat(val);
  if (isNaN(num) || num < 0) return;
  state.hours[aKey(name,d)] = num;
  saveState(); closeModal();
}
function clearHours() {
  const name = modalData.emp, d = modalData.day;
  delete state.hours[aKey(name,d)];
  saveState(); closeModal();
}
function calcEarned(name,y=curYear,m=curMonth) {
  const rate = getRate(name);
  const days = daysInMonth(y,m);
  let pay = 0;
  if (isHourly(name)) {
    for(let d=1; d<=days; d++) {
      const key = `${name}__${y}-${m}-${d}`;
      const h = state.hours[key];
      if (h) pay += rate * h;
    }
  } else {
    for(let d=1; d<=days; d++) {
      const key = `${name}__${y}-${m}-${d}`;
      pay += rate * STATUS[state.attendance[key] || '-'].mult;
    }
  }
  return pay;
}
function getRate(name) {
  const emp = getEmp(name);
  return emp ? parseFloat(emp.rate)||0 : 0;
}
function getSummary(name) {
  if (isHourly(name)) {
    const days = daysInMonth(curYear,curMonth);
    let totalHours=0, daysWorked=0;
    for(let d=1;d<=days;d++){ const h=getHours(name,d); if(h){ totalHours+=h; daysWorked++; } }
    return { totalHours, daysWorked };
  }
  const c={P:0,H:0,A:0,L:0};
  for(let d=1;d<=daysInMonth(curYear,curMonth);d++){const s=getAtt(name,d);if(c[s]!==undefined)c[s]++;}
  return c;
}
function getBalance(name,y=curYear,m=curMonth) {
  return totalCarry(name,y,m) + calcEarned(name,y,m) + totalComm(name,y,m) - totalPaid(name,y,m);
}
function getPrevBalance(name) {
  const {y,m} = prevMonthYM(curYear,curMonth);
  return getBalance(name,y,m);
}
function isWeekend(d) { const day=new Date(curYear,curMonth,d).getDay(); return day===0||day===6; }
function isToday(d)   { return d===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear(); }
function render() {
  const tableWrap = document.querySelector('.table-wrap');
  const scrollLeft = tableWrap ? tableWrap.scrollLeft : 0;
  const scrollY = window.scrollY;

  document.getElementById('app').innerHTML = buildApp();

  const newTableWrap = document.querySelector('.table-wrap');
  if (newTableWrap) newTableWrap.scrollLeft = scrollLeft;
  window.scrollTo(0, scrollY);
}
function buildApp() {
  return `
    ${buildHeader()}
    ${buildMonthNav()}
    ${buildTabs()}
    <div style="padding:18px">
      ${curView==='attendance' ? buildAttendance() : buildPayroll()}
    </div>
    ${modal ? buildModal() : ''}
  `;
}
function buildHeader() {
  const dotColor = syncStatus==='saving'?'#C2740A':syncStatus==='error'?'#C81E4E':'var(--teal)';
  const pillColor = syncStatus==='saving'?'#C2740A':syncStatus==='error'?'#C81E4E':'var(--teal-deep)';
  const pillText = syncStatus==='saving'?'SAVING…':syncStatus==='error'?'ERROR':'SYNCED';
  return `
    <div class="header">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="header-mark">📋</div>
        <div>
          <div class="header-title">Attendance &amp; Payroll</div>
          <div class="header-sub">FTM MANAGEMENT · ${state.employees.length} ${state.employees.length===1?'EMPLOYEE':'EMPLOYEES'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="save-pill" id="save-pill" style="color:${pillColor}"><span id="save-dot" style="width:6px;height:6px;border-radius:50%;background:${dotColor};display:inline-block"></span>&nbsp;${pillText}</span>
        ${state.employees.length<8?`<button class="header-add" onclick="openModal('addEmp')">+ Add</button>`:''}
      </div>
    </div>
  `;
}
function buildMonthNav() {
  return `
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <span class="month-label">${MONTHS[curMonth]} ${curYear}</span>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
  `;
}
function buildTabs() {
  return `
    <div class="tabs">
      <button class="tab ${curView==='attendance'?'active':''}" onclick="setView('attendance')">Attendance</button>
      <button class="tab ${curView==='payroll'?'active':''}" onclick="setView('payroll')">Payroll</button>
    </div>
  `;
}
function buildAttendance() {
  if(state.employees.length===0) return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No employees yet</div><div class="empty-sub">Tap "+ Add" above to get started</div></div>`;
  const days = daysInMonth(curYear, curMonth);
  const dayNums = Array.from({length:days},(_,i)=>i+1);
  let html = `
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center">
      ${Object.entries(STATUS).filter(([k])=>k!=='-').map(([k,v])=>`
        <span class="chip" style="background:${v.bg};color:${v.color}">${v.short} ${v.label}</span>
      `).join('')}

}
function buildPayroll() {
  const allEarned   = state.employees.reduce((s,e)=>s+calcEarned(e.name),0);
  const allComm     = state.employees.reduce((s,e)=>s+totalComm(e.name),0);
  const allPaid     = state.employees.reduce((s,e)=>s+totalPaid(e.name),0);
  const allCarry    = state.employees.reduce((s,e)=>s+totalCarry(e.name),0);
  const allBalance  = allEarned+allComm+allCarry-allPaid;
  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:20px">
      ${[
        {l:'Brought Forward',v:fmt(allCarry),c:'#6D4FC2'},
        {l:'Total Earned',v:fmt(allEarned),c:'#0F766E'},
        {l:'Commission',v:fmt(allComm),c:'#2563A8'},
        {l:'Total Paid',v:fmt(allPaid),c:'#1C2541'},
      ].map(x=>`
        <div class="summary-stat">
          <div class="summary-stat-label">${x.l}</div>
          <div class="summary-stat-val" style="color:${x.c}">${x.v}</div>
        </div>
      `).join('')}
    </div>
    <div class="card" style="padding:17px 19px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-color:${allBalance>0?'rgba(194,116,10,0.3)':'rgba(15,118,110,0.25)'}">
      <div class="section-label" style="margin-bottom:0">Total Balance Owed</div>
      <div class="mono" style="font-size:23px;font-weight:800;color:${allBalance>0?'#C2740A':'#0F766E'}">${fmt(allBalance)}</div>
    </div>
  `;
  if(state.employees.length===0) return html+`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No employees yet</div></div>`;
  state.employees.forEach(emp=>{
    const hourly  = emp.payType==='hourly';
    const earned  = calcEarned(emp.name);
    const comms   = getComms(emp.name);
    const totC    = totalComm(emp.name);
    const pays    = getPays(emp.name);
    const totP    = totalPaid(emp.name);
    const carries = getCarry(emp.name);
    const totCarry= totalCarry(emp.name);
    const subtotal= totCarry+earned+totC;
    const balance = subtotal-totP;
    const s       = getSummary(emp.name);
    const prevBal = getPrevBalance(emp.name);
    const alreadyHandled = !!state.carryHandled[mKey(emp.name)];
    const {y:py,m:pm} = prevMonthYM(curYear,curMonth);
    const showCarrySuggestion = !alreadyHandled && Math.abs(prevBal) > 0.001;
    const summaryChips = hourly
      ? `<span class="chip" style="background:var(--violet-bg);color:#6D4FC2">${s.totalHours} hrs total</span>
         <span class="chip" style="background:var(--line-soft);color:var(--ink-soft)">${s.daysWorked} days worked</span>`
      : [{l:'Present',v:s.P,c:'#0F766E',bg:'#E6F4F2'},{l:'Half',v:s.H,c:'#C2740A',bg:'#FBF0DD'},{l:'Absent',v:s.A,c:'#C81E4E',bg:'#FBE6EC'},{l:'Leave',v:s.L,c:'#6D4FC2',bg:'#EFEAFB'}].map(x=>
          `<span class="chip" style="background:${x.bg};color:${x.c}">${x.v} ${x.l}</span>`).join('');
    html += `
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="serif" style="font-size:17px;font-weight:600;color:var(--ink)">${emp.name}</div>
              <span class="type-pill" style="background:${hourly?'var(--violet-bg)':'var(--teal-bg)'};color:${hourly?'#6D4FC2':'#0F766E'}">${hourly?'Hourly':'Daily'}</span>
            </div>
            <div class="mono" style="font-size:11px;color:var(--ink-faint);margin-top:3px">${fmt(emp.rate)}${hourly?'/hr':'/day'} · ${SMONTHS[curMonth]} ${curYear}</div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="btn-icon" onclick="openModal('editEmp','${emp.name}')">✏️</button>
            <button class="btn-icon" onclick="removeEmp('${emp.name}')">🗑️</button>
          </div>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
          ${summaryChips}
        </div>
        ${showCarrySuggestion?`
          <div class="carry-banner" style="margin-bottom:16px">
            <div>
              <div style="font-size:12px;font-weight:700;color:#6D4FC2">Outstanding from ${MONTHS[pm]} ${py}</div>
              <div class="mono" style="font-size:16px;font-weight:800;color:#4A3580;margin-top:2px">${fmt(prevBal)}</div>
            </div>
            <button class="btn-action" style="background:#6D4FC2;border-color:#6D4FC2;color:white" onclick="bringForward('${emp.name}',${prevBal.toFixed(2)})">Bring forward →</button>
          </div>
        `:''}
        <hr class="divider"/>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
            <div class="section-label" style="color:#6D4FC2;margin-bottom:0">Brought Forward</div>
            <button class="btn-action" style="border-color:rgba(109,79,194,0.3);color:#6D4FC2" onclick="openModal('carry','${emp.name}')">+ Add</button>
          </div>
          ${carries.length===0?`<div style="font-size:12px;color:var(--ink-faint);font-style:italic">Nothing carried forward</div>`:`
            <div style="display:flex;flex-direction:column;gap:7px">
              ${carries.map(c=>`
                <div style="display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line-soft);border-radius:10px;padding:9px 13px">
                  <div>
                    <span class="mono" style="font-size:13px;color:#6D4FC2;font-weight:700">${parseFloat(c.amount)>=0?'+':''}${fmt(c.amount)}</span>
                    ${c.note?`<span style="font-size:12px;color:var(--ink-faint);margin-left:8px">${c.note}</span>`:''}
                  </div>
                  <button class="btn-icon" onclick="removeCarry('${emp.name}',${c.id})">✕</button>
                </div>
              `).join('')}
              <div style="text-align:right;font-size:12px;color:#6D4FC2;font-family:'JetBrains Mono',monospace;font-weight:700">Total: ${fmt(totCarry)}</div>
            </div>
          `}
        </div>
        <hr class="divider"/>
        <div class="section-label" style="margin-bottom:10px">Weekly Breakdown</div>
        ${getWeeks(curYear,curMonth).map(w=>{
          const wE   = getWeekEarned(emp.name, w.start, w.end);
          const wP   = totalWeekPaid(emp.name, w.wn);
          const wBal = wE - wP;
          const wPays= getWeekPays(emp.name, w.wn);
          const paid = wBal <= 0.001;
          return `
          <div style="border:1px solid ${paid?'rgba(15,118,110,0.25)':'var(--line)'};border-radius:12px;overflow:hidden;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:${paid?'rgba(15,118,110,0.04)':'var(--paper)'};">
              <div>
                <div style="font-size:12px;font-weight:700;color:var(--ink)">${w.label}</div>
                <div style="font-size:11px;color:var(--ink-faint);margin-top:2px">
                  Earned: <span class="mono" style="font-weight:700;color:#0F766E">${fmt(wE)}</span>
                  ${wP>0?` · Paid: <span class="mono" style="color:var(--ink-soft);font-weight:700">${fmt(wP)}</span>`:''}
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                ${paid
                  ? `<span style="font-size:12px;font-weight:700;color:#0F766E">✓ Paid</span>`
                  : `<span class="mono" style="font-size:13px;font-weight:800;color:#C2740A">${fmt(wBal)} owed</span>`}
                <button class="btn-action" onclick="openWeekPayModal('${emp.name}',${w.wn},'${w.label}',${wE})" ${wE===0?'disabled style="opacity:0.35"':''}>+ Pay</button>
              </div>
            </div>
            ${wPays.length>0?`
              <div style="padding:8px 14px 4px;border-top:1px solid var(--line-soft);background:#fff;">
                ${wPays.map(p=>`
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--line-soft);">
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                      <span class="mono" style="font-size:12px;font-weight:700;color:var(--ink)">−${fmt(p.amount)}</span>
                      <span style="font-size:11px;color:var(--ink-faint);background:var(--line-soft);border-radius:6px;padding:2px 7px">${fmtDate(p.date)}</span>
                      ${p.note?`<span style="font-size:11px;color:var(--ink-faint)">${p.note}</span>`:''}
                    </div>
                    <button class="btn-icon" onclick="removePay('${emp.name}',${p.id})">✕</button>
                  </div>
                `).join('')}
              </div>
            `:''}
          </div>`;
        }).join('')}
        <hr class="divider"/>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
            <div class="section-label" style="margin-bottom:0">Commission</div>
            <button class="btn-action" onclick="openModal('comm','${emp.name}')">+ Add</button>
          </div>
          ${comms.length===0?`<div style="font-size:12px;color:var(--ink-faint);font-style:italic">No commission added</div>`:`
            <div style="display:flex;flex-direction:column;gap:7px">
              ${comms.map(c=>`
                <div style="display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line-soft);border-radius:10px;padding:9px 13px">
                  <div>
                    <span class="mono" style="font-size:13px;color:#2563A8;font-weight:700">+${fmt(c.amount)}</span>
                    ${c.note?`<span style="font-size:12px;color:var(--ink-faint);margin-left:8px">${c.note}</span>`:''}
                  </div>
                  <button class="btn-icon" onclick="removeComm('${emp.name}',${c.id})">✕</button>
                </div>
              `).join('')}
              <div style="text-align:right;font-size:12px;color:#2563A8;font-family:'JetBrains Mono',monospace;font-weight:700">Total: ${fmt(totC)}</div>
            </div>
          `}
        </div>
        <button class="btn-action" style="margin-bottom:16px" onclick="openModal('comm','${emp.name}')">+ Add Commission</button>
        <hr class="divider"/>
        <div class="${balance<=0?'balance-paid':'balance-owed'}">
          <div>
            <div style="font-size:13px;font-weight:700;color:${balance<=0?'#0F766E':'#C2740A'}">${balance<=0?'✓ FULLY PAID':'⚠ BALANCE OWED'}</div>
            <div style="font-size:11px;color:${balance<=0?'#0B5C56':'#9C5E08'};margin-top:2px">${balance<=0?'No outstanding amount':'Still to be paid'}</div>
          </div>
          <span class="mono" style="font-size:25px;font-weight:800;color:${balance<=0?'#0F766E':'#C2740A'}">${fmt(Math.abs(balance))}</span>
        </div>
      </div>
    `;
  });
  return html;
}

      <div class="modal-title">Add Brought-Forward Balance</div>
      <div class="modal-sub">${modalData.emp} · ${SMONTHS[curMonth]} ${curYear}</div>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div><label class="label">Amount (£) — use negative to subtract</label><input class="input" id="m-amount" type="number" step="0.01" placeholder="e.g. 110"/></div>
        <div><label class="label">Note (optional)</label><input class="input" id="m-note" placeholder="e.g. Owed from last week of May" autocomplete="off"/></div>
        <div style="display:flex;gap:10px;margin-top:6px">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="addCarry()">Add</button>
        </div>
      </div>
    `;
  }
  return `<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${inner}</div></div>`;
}
function setAddPayType(t) { addPayType=t; render(); setTimeout(()=>{ const el=document.getElementById('m-name'); if(el) el.focus(); },50); }
function setEditPayType(t) { editPayType=t; render(); }
function openModal(type, emp) {
  modal=type; modalData={emp};
  if (type==='addEmp') addPayType='daily';
  render();
  setTimeout(()=>{ const el=document.getElementById('m-name')||document.getElementById('m-amount'); if(el) el.focus(); },100);
}
function closeModal() { modal=null; modalData={}; render(); }
function addEmp() {
  const name=(document.getElementById('m-name').value||'').trim();
  const rate=parseFloat(document.getElementById('m-rate').value);
  if(!name||state.employees.find(e=>e.name===name)||isNaN(rate)||rate<=0) return;
  state.employees.push({name,rate,payType:addPayType});
  saveState(); closeModal();
}
function saveEdit() {
  const name=(document.getElementById('m-name').value||'').trim();
  const rate=parseFloat(document.getElementById('m-rate').value);
  const old=modalData.emp;
  if(!name||isNaN(rate)||rate<=0) return;
  if(name!==old && state.employees.find(e=>e.name===name)) return;
  const idx=state.employees.findIndex(e=>e.name===old);
  if(idx<0) return;
  state.employees[idx]={name,rate,payType:editPayType};
  if(name!==old) {
    const migrate=obj=>{ const n={}; Object.entries(obj).forEach(([k,v])=>{ n[k.startsWith(old+'__')?k.replace(old+'__',name+'__'):k]=v; }); return n; };
    state.attendance=migrate(state.attendance);
    state.hours=migrate(state.hours);
    state.commissions=migrate(state.commissions);
    state.payments=migrate(state.payments);
    state.carryForward=migrate(state.carryForward);
    state.carryHandled=migrate(state.carryHandled);
  }
  saveState(); closeModal();
}
function removeEmp(name) {
  if(!confirm(`Remove "${name}"? All data deleted.`)) return;
  state.employees=state.employees.filter(e=>e.name!==name);
  [state.attendance,state.hours,state.commissions,state.payments,state.carryForward,state.carryHandled].forEach(obj=>{ Object.keys(obj).forEach(k=>{ if(k.startsWith(name+'__')) delete obj[k]; }); });
  saveState(); render();
}
function addComm() {
  const amt=parseFloat(document.getElementById('m-amount').value);
  const note=(document.getElementById('m-note').value||'').trim();
  if(isNaN(amt)||amt===0) return;
  const k=mKey(modalData.emp);
  if(!state.commissions[k]) state.commissions[k]=[];
  state.commissions[k].push({id:Date.now(),amount:amt,note});
  saveState(); closeModal();
}
function removeComm(name,id) {
  const k=mKey(name); if(!state.commissions[k]) return;
  state.commissions[k]=state.commissions[k].filter(c=>c.id!==id);
  saveState(); render();
}
function addPay() {
  const amt=parseFloat(document.getElementById('m-amount').value);
  const date=document.getElementById('m-date').value;
  const note=(document.getElementById('m-note').value||'').trim();
  if(isNaN(amt)||amt<=0) return;
  const k=mKey(modalData.emp);
  if(!state.payments[k]) state.payments[k]=[];
  const entry={id:Date.now(),amount:amt,date,note};
  if(modalData.week) entry.week=modalData.week;
  state.payments[k].push(entry);
  saveState(); closeModal();
}
function removePay(name,id) {
  const k=mKey(name); if(!state.payments[k]) return;
  state.payments[k]=state.payments[k].filter(p=>p.id!==id);
  saveState(); render();
}
function addCarry() {
  const amt=parseFloat(document.getElementById('m-amount').value);
  const note=(document.getElementById('m-note').value||'').trim();
  if(isNaN(amt)||amt===0) return;
  const k=mKey(modalData.emp);
  if(!state.carryForward[k]) state.carryForward[k]=[];
  state.carryForward[k].push({id:Date.now(),amount:amt,note});
  saveState(); closeModal();
}
function removeCarry(name,id) {
  const k=mKey(name); if(!state.carryForward[k]) return;
  state.carryForward[k]=state.carryForward[k].filter(c=>c.id!==id);
  saveState(); render();
}
function bringForward(name, amount) {
  const k=mKey(name);
  if(!state.carryForward[k]) state.carryForward[k]=[];
  const {y:py,m:pm} = prevMonthYM(curYear,curMonth);
  state.carryForward[k].push({id:Date.now(),amount:amount,note:`From ${SMONTHS[pm]} ${py}`});
  state.carryHandled[k]=true;
  saveState(); render();
}
// ── Weekly helpers ────────────────────────────────────────
function getWeeks(year, month) {
  const days = daysInMonth(year, month);
  const weeks = [];
  let start = 1, wn = 1;
  while (start <= days) {
    const end = Math.min(start + 6, days);
    weeks.push({ wn, key:`W${wn}`, start, end, label:`Week ${wn}  (${start}–${end} ${SMONTHS[month]})` });
    start = end + 1; wn++;
  }
  return weeks;
}
function getWeekEarned(name, startDay, endDay) {
  const emp = getEmp(name); if(!emp) return 0;
  const hourly = isHourly(name);
  let earned = 0;
  for(let d = startDay; d <= endDay; d++) {
    const att = getAtt(name, d);
    if(hourly) { if(att==='P') earned += getHours(name,d) * emp.rate; }
    else { if(att==='P') earned += emp.rate; else if(att==='H') earned += emp.rate/2; }
  }
  return earned;
}
function getWeekPays(name, wn) {
  const k = mKey(name);
  return (state.payments[k]||[]).filter(p => p.week === `W${wn}`);
}
function totalWeekPaid(name, wn) {
  return getWeekPays(name,wn).reduce((s,p)=>s+parseFloat(p.amount||0),0);
}
function openWeekPayModal(emp, wn, weekLabel, suggested) {
  modal='pay'; modalData={emp, week:`W${wn}`, weekLabel, suggested:suggested.toFixed(2)};
  render();
  setTimeout(()=>{ const el=document.getElementById('m-amount'); if(el){el.select();el.focus();} },100);
}
// ─────────────────────────────────────────────────────────
function prevMonth() { if(curMonth===0){curMonth=11;curYear--;}else curMonth--; render(); }
function nextMonth() { if(curMonth===11){curMonth=0;curYear++;}else curMonth++; render(); }
function setView(v)  { curView=v; render(); }

// ── Init ──────────────────────────────────────────────────────────────────────
loadState().then(() => render());
</script>
