<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Accounts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0f1e;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{height:5px;width:5px}
  ::-webkit-scrollbar-track{background:#0f172a}
  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
  .mono{font-family:'DM Mono',monospace}
  .header{background:#0d1117;border-bottom:1px solid #1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .header-title{font-size:17px;font-weight:700;color:#f1f5f9;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:#475569;margin-top:2px;font-family:'DM Mono',monospace}
  .period-nav{background:#0d1117;border-bottom:1px solid #1e293b;padding:10px 16px;display:flex;align-items:center;gap:10px}
  .btn-primary{background:#0ea5e9;border:none;color:white;border-radius:9px;padding:10px 18px;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;transition:background 0.15s;width:100%}
  .btn-primary:active{background:#0284c7}
  .btn-ghost{background:transparent;border:1px solid #334155;color:#94a3b8;border-radius:9px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;width:100%}
  .btn-ghost:active{background:#1e293b}
  .btn-action{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap}
  .btn-action:active{background:#334155}
  .btn-icon{background:transparent;border:none;cursor:pointer;padding:4px 6px;border-radius:5px;font-size:13px;opacity:0.45;transition:opacity 0.15s}
  .btn-icon:active{opacity:1}
  .input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:9px;padding:11px 13px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;width:100%;-webkit-appearance:none}
  .input:focus{border-color:#38bdf8}
  .num{background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;border-radius:7px;padding:8px 9px;font-size:14px;font-family:'DM Mono',monospace;outline:none;width:100%;text-align:right;-webkit-appearance:none}
  .num:focus{border-color:#38bdf8}
  .select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:9px;padding:10px 13px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;flex:1;-webkit-appearance:none}
  .label{font-size:12px;color:#64748b;font-weight:600;display:block;margin-bottom:6px;letter-spacing:0.04em}
  .card{background:#111827;border:1px solid #1e293b;border-radius:14px;padding:18px}
  .section-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:10px}
  .divider{border:none;border-top:1px solid #1e293b;margin:16px 0}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:100}
  .modal{background:#111827;border:1px solid #1e293b;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
  .modal-title{font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
  .modal-sub{font-size:13px;color:#475569;margin-bottom:20px}
  .save-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;opacity:0;transition:opacity 0.3s}
  .save-dot.show{opacity:1}
  table{border-collapse:collapse;width:100%}
  .grid-th{padding:6px 4px;font-size:10px;color:#475569;font-weight:600;text-align:center;text-transform:uppercase;letter-spacing:0.04em}
  .grid-day{padding:6px 8px;font-size:12px;color:#94a3b8;font-weight:600;text-align:left;white-space:nowrap}
  .empty{text-align:center;padding:54px 20px;color:#334155}
  .empty-icon{font-size:38px;margin-bottom:12px}
  .empty-text{font-size:15px;font-weight:600;color:#475569}
  .empty-sub{font-size:13px;margin-top:6px;color:#475569}
  .net-pos{background:#052e16;border:1px solid #166534}
  .net-neg{background:#1c1208;border:1px solid #92400e}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ── Supabase sync (shares the ftm_attendance table; this page uses row id="accounts") ── */
const SB_URL  = 'https://qibdsiirzhfkpkyznfys.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpYmRzaWlyemhma3BreXpuZnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYyMDgsImV4cCI6MjA5MjI2MjIwOH0.ikrSP2efW_6e7BZdcdqvfKtZrswvt8hlF8F4gcPknpg';
const SB_REST = SB_URL + '/rest/v1/ftm_attendance';
const SB_HEAD = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
const SB_ROW  = 'accounts';
const STORAGE_KEY = 'ftm_accounts_v1';

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat'];
/* Payment columns shown per day. Cash + non-cash methods (modes of "card"). */
const PAY = [
  { key:'cash',         label:'Cash',   color:'#34d399' },
  { key:'card',         label:'Card',   color:'#60a5fa' },
  { key:'bankTransfer', label:'Bank',   color:'#38bdf8' },
  { key:'klarna',       label:'Klarna', color:'#f472b6' },
  { key:'square',       label:'Square', color:'#a78bfa' },
  { key:'paypal',       label:'PayPal', color:'#2dd4bf' },
];
/* legacy period-level method keys (migrated into the daily grid) */
const LEGACY_METHODS = ['bankTransfer','klarna','square','paypal'];
const DEFAULT_EXPENSES = ['Photographer','Makeup Artist','Rhys / Daniel','Kerry','Rent Studio','Rent Office','Zettle','Advert / PayPal','Bank Exp'];
const SMONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const fmt = n => '£' + (Number(n)||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
function fmtEnd(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return `${d.getDate()} ${SMONTHS[d.getMonth()]} ${d.getFullYear()}`; }

let state = { periods: [] };
let curId = null;
let modal = null;
let saveTimer = null, cloudTimer = null;
let cloudStatus = { text:'', color:'#475569' };

/* ---------- persistence ---------- */
function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) state = Object.assign({periods:[]}, JSON.parse(raw));
  }catch(e){}
  migrateState();
  if(!curId && state.periods.length) curId = state.periods[0].id;
}

async function loadCloud(){
  setCloudStatus('saving','Loading…');
  try{
    const res = await fetch(`${SB_REST}?id=eq.${SB_ROW}&select=data`, { headers: SB_HEAD });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    if(rows && rows.length && rows[0].data){
      state = Object.assign({periods:[]}, rows[0].data);
      migrateState();
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
    }
    if(!curId && state.periods.length) curId = state.periods[0].id;
    setCloudStatus('synced');
  }catch(e){
    setCloudStatus('offline');
  }
  render();
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  showSave();
  pushCloud();
}

function pushCloud(){
  clearTimeout(cloudTimer);
  setCloudStatus('saving');
  cloudTimer = setTimeout(async ()=>{
    try{
      const body = JSON.stringify([{ id: SB_ROW, data: state, updated_at: new Date().toISOString().slice(0,23) }]);
      const res = await fetch(SB_REST, { method:'POST', headers: Object.assign({}, SB_HEAD, {'Prefer':'resolution=merge-duplicates,return=minimal'}), body });
      if(!res.ok) throw new Error('HTTP '+res.status);
      setCloudStatus('synced');
    }catch(e){ setCloudStatus('offline'); }
  }, 600);
}

function showSave(){
  const dot = document.getElementById('save-dot');
  if(!dot) return;
  dot.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>dot.classList.remove('show'), 2000);
}

function setCloudStatus(s, customText){
  if(s==='saving')      cloudStatus = { text: customText||'Saving…', color:'#f59e0b' };
  else if(s==='synced') cloudStatus = { text:'✓ Synced',  color:'#22c55e' };
  else                  cloudStatus = { text:'⚠ Offline', color:'#ef4444' };
  const el = document.getElementById('cloud-status');
  if(el){ el.textContent = cloudStatus.text; el.style.color = cloudStatus.color; }
}

/* ---------- helpers ---------- */
const getPeriod = () => state.periods.find(p => p.id === curId) || null;

function blankDay(){ const d={}; PAY.forEach(c => d[c.key]=0); return d; }

function blankPeriod(type, endDate){
  const days = {};
  DAYS.forEach(d => days[d] = blankDay());
  return {
    id: Date.now(),
    type,
    endDate,
    label: (type==='fortnightly'?'Fortnight':'Week') + ' end ' + fmtEnd(endDate),
    days,
    expenses: DEFAULT_EXPENSES.map((name,i)=>({ id: Date.now()+i+1, name, amount:0 })),
  };
}

/* Upgrade old data: make sure every day has all payment keys, and fold any
   legacy period-level methods (Other Income) into Monday so nothing is lost. */
function migratePeriod(p){
  if(!p.days) p.days = {};
  DAYS.forEach(d => {
    if(!p.days[d]) p.days[d] = {};
    PAY.forEach(c => { if(typeof p.days[d][c.key] !== 'number') p.days[d][c.key] = num(p.days[d][c.key]); });
  });
  if(p.methods){
    LEGACY_METHODS.forEach(k => {
      const v = num(p.methods[k]);
      if(v) p.days['Mon'][k] = num(p.days['Mon'][k]) + v;
    });
    delete p.methods;
  }
  return p;
}

function migrateState(){ (state.periods||[]).forEach(migratePeriod); }

function totals(p){
  const sums = {}; PAY.forEach(c => sums[c.key] = 0);
  DAYS.forEach(d => PAY.forEach(c => sums[c.key] += num(p.days[d][c.key])));
  const income = PAY.reduce((s,c)=>s+sums[c.key], 0);
  const expenses = p.expenses.reduce((s,e)=>s+num(e.amount), 0);
  return { sums, income, expenses, net: income - expenses };
}

/* ---------- render ---------- */
function render(){ document.getElementById('app').innerHTML = buildApp(); }

function buildApp(){
  return `${buildHeader()}${buildNav()}<div style="padding:16px;max-width:760px;margin:0 auto">${buildBody()}</div>${modal?buildModal():''}`;
}

function buildHeader(){
  return `
    <div class="header">
      <div>
        <div class="header-title">💷 Accounts</div>
        <div class="header-sub">FTM Management · ${state.periods.length} period${state.periods.length!==1?'s':''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="cloud-status" class="mono" style="font-size:10px;color:${cloudStatus.color}">${cloudStatus.text}</span>
        <span class="save-dot" id="save-dot"></span>
        <button class="btn-action" onclick="openNew()" style="font-size:13px;padding:8px 14px">+ New</button>
      </div>
    </div>`;
}

function buildNav(){
  if(!state.periods.length) return '';
  return `
    <div class="period-nav">
      <select class="select" onchange="selectPeriod(this.value)">
        ${state.periods.map(p=>`<option value="${p.id}" ${p.id===curId?'selected':''}>${p.label}</option>`).join('')}
      </select>
      <button class="btn-action" onclick="downloadXlsx()" style="color:#38bdf8;border-color:#0e7490">⬇ Excel</button>
      <button class="btn-action" onclick="deletePeriod()" style="color:#ef4444;border-color:#7f1d1d">Delete</button>
    </div>`;
}

function buildBody(){
  if(!state.periods.length){
    return `<div class="empty"><div class="empty-icon">📒</div><div class="empty-text">No accounts yet</div><div class="empty-sub">Tap “+ New” to start a week or fortnight</div></div>`;
  }
  const p = getPeriod();
  if(!p) return '';
  const t = totals(p);

  return `
    <!-- summary -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${[
        {l:'Total Income',v:fmt(t.income),c:'#34d399'},
        {l:'Total Expenses',v:fmt(t.expenses),c:'#f87171'},
      ].map(x=>`
        <div class="card" style="padding:12px 14px">
          <div style="font-size:10px;color:#475569;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px">${x.l}</div>
          <div class="mono" style="font-size:20px;font-weight:700;color:${x.c}">${x.v}</div>
        </div>`).join('')}
    </div>
    <div class="card ${t.net>=0?'net-pos':'net-neg'}" style="padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:${t.net>=0?'#22c55e':'#f59e0b'}">${t.net>=0?'Net Profit':'Net Loss'}</div>
      <div class="mono" style="font-size:24px;font-weight:700;color:${t.net>=0?'#22c55e':'#f59e0b'}">${fmt(Math.abs(t.net))}</div>
    </div>

    <!-- daily takings: cash + card payment methods per day -->
    <div class="card" style="margin-bottom:14px">
      <div class="section-label">Daily Takings — Cash &amp; Card methods</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="min-width:560px">
          <thead>
            <tr>
              <th class="grid-th" style="text-align:left;position:sticky;left:0;background:#111827;z-index:1">Day</th>
              ${PAY.map(c=>`<th class="grid-th" style="color:${c.color}">${c.label}</th>`).join('')}
              <th class="grid-th" style="text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${DAYS.map(d=>{
              const day = p.days[d];
              const tot = PAY.reduce((s,c)=>s+num(day[c.key]),0);
              return `
                <tr>
                  <td class="grid-day" style="position:sticky;left:0;background:#111827;z-index:1">${d}</td>
                  ${PAY.map(c=>`<td style="padding:3px 4px"><input class="num" style="min-width:64px" type="number" inputmode="decimal" step="0.01" value="${day[c.key]||''}" placeholder="0" onchange="setDay(${p.id},'${d}','${c.key}',this.value)"/></td>`).join('')}
                  <td class="mono" style="text-align:right;padding:3px 8px;color:#94a3b8;font-size:13px;white-space:nowrap">${fmt(tot)}</td>
                </tr>`;
            }).join('')}
            <tr>
              <td class="grid-day" style="border-top:1px solid #1e293b;color:#cbd5e1;font-weight:700;padding-top:8px;position:sticky;left:0;background:#111827;z-index:1">Total</td>
              ${PAY.map(c=>`<td class="mono" style="border-top:1px solid #1e293b;text-align:right;padding:8px 9px 0;color:#34d399;font-size:13px;white-space:nowrap">${fmt(t.sums[c.key])}</td>`).join('')}
              <td class="mono" style="border-top:1px solid #1e293b;text-align:right;padding:8px 8px 0;color:#34d399;font-size:14px;font-weight:700;white-space:nowrap">${fmt(t.income)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="font-size:11px;color:#475569;margin-top:8px">Swipe sideways to see all payment methods →</div>
    </div>

    <!-- expenses -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="section-label" style="margin-bottom:0">Expenses</div>
        <button class="btn-action" style="border-color:#7f1d1d40;color:#f87171" onclick="addExpense(${p.id})">+ Add</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${p.expenses.length===0?`<div style="font-size:12px;color:#334155;font-style:italic">No expenses added</div>`:
          p.expenses.map(e=>`
            <div style="display:flex;align-items:center;gap:8px">
              <input class="input" style="flex:1;padding:8px 11px;font-size:14px" value="${(e.name||'').replace(/"/g,'&quot;')}" placeholder="Expense name" onchange="setExpenseName(${p.id},${e.id},this.value)"/>
              <div style="width:120px"><input class="num" type="number" inputmode="decimal" step="0.01" value="${e.amount||''}" placeholder="0" onchange="setExpenseAmt(${p.id},${e.id},this.value)"/></div>
              <button class="btn-icon" style="color:#ef4444" onclick="removeExpense(${p.id},${e.id})">✕</button>
            </div>`).join('')}
        <div style="display:flex;justify-content:space-between;border-top:1px solid #1e293b;padding-top:8px;margin-top:2px">
          <span style="font-size:13px;font-weight:700;color:#cbd5e1">Total Expenses</span>
          <span class="mono" style="font-size:14px;font-weight:700;color:#f87171">${fmt(t.expenses)}</span>
        </div>
      </div>
    </div>

    <div style="font-size:11px;color:#334155;text-align:center;margin:10px 0 30px">Saves automatically · ${p.type==='fortnightly'?'Fortnightly':'Weekly'} account</div>
  `;
}

function buildModal(){
  const today = new Date().toISOString().slice(0,10);
  return `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">New Account</div>
        <div class="modal-sub">Start a new weekly or fortnightly sheet</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div>
            <label class="label">PERIOD TYPE</label>
            <select class="select" id="m-type" style="width:100%">
              <option value="weekly">Weekly</option>
              <option value="fortnightly">Fortnightly</option>
            </select>
          </div>
          <div><label class="label">PERIOD END DATE</label><input class="input" id="m-end" type="date" value="${today}"/></div>
          <div>
            <label class="label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
              <input type="checkbox" id="m-copy" style="width:16px;height:16px"/> Copy expense names from current sheet
            </label>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px">
            <button class="btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" onclick="createPeriod()">Create</button>
          </div>
        </div>
      </div>
    </div>`;
}

/* ---------- actions ---------- */
function openNew(){ modal = true; render(); }
function closeModal(){ modal = null; render(); }

function createPeriod(){
  const type = document.getElementById('m-type').value;
  const end  = document.getElementById('m-end').value;
  if(!end) return;
  const p = blankPeriod(type, end);
  const copy = document.getElementById('m-copy').checked;
  const cur = getPeriod();
  if(copy && cur){
    p.expenses = cur.expenses.map((e,i)=>({ id: Date.now()+i+1, name: e.name, amount: 0 }));
  }
  state.periods.unshift(p);
  curId = p.id;
  modal = null;
  saveState(); render();
}

function selectPeriod(id){ curId = Number(id); render(); }

function downloadXlsx(){
  const p = getPeriod();
  if(!p){ return; }
  const t = totals(p);
  const aoa = [];
  aoa.push(['FTM Management — Accounts']);
  aoa.push([p.label]);
  aoa.push([(p.type==='fortnightly'?'Fortnightly':'Weekly'), 'Period end:', fmtEnd(p.endDate)]);
  aoa.push([]);
  aoa.push(['DAILY TAKINGS (£)']);
  aoa.push(['Day', ...PAY.map(c=>c.label), 'Total']);
  DAYS.forEach(d=>{ const day=p.days[d]; const row=PAY.map(c=>num(day[c.key])); aoa.push([d, ...row, row.reduce((s,v)=>s+v,0)]); });
  aoa.push(['Total', ...PAY.map(c=>t.sums[c.key]), t.income]);
  aoa.push([]);
  aoa.push(['EXPENSES', 'Amount (£)']);
  p.expenses.forEach(e=> aoa.push([e.name || '(unnamed)', num(e.amount)]));
  aoa.push(['Total Expenses', t.expenses]);
  aoa.push([]);
  aoa.push(['SUMMARY']);
  aoa.push(['Total Income', t.income]);
  aoa.push(['Total Expenses', t.expenses]);
  aoa.push([(t.net>=0 ? 'Balance (Net Profit)' : 'Balance (Net Loss)'), t.net]);

  const safe = (p.label || 'account').replace(/[^a-z0-9]+/gi,'_').replace(/^_+|_+$/g,'');
  if(typeof XLSX !== 'undefined'){
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:24}].concat(PAY.map(()=>({wch:11})), [{wch:12}]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Accounts');
    XLSX.writeFile(wb, safe + '.xlsx');
  } else {
    // Fallback: CSV (still opens in Excel) if the spreadsheet library didn't load
    const csv = aoa.map(r => r.map(c => {
      const s = (c==null ? '' : String(c));
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = safe + '.csv';
    a.click();
  }
}

function deletePeriod(){
  const p = getPeriod();
  if(!p) return;
  if(!confirm(`Delete “${p.label}”? This cannot be undone.`)) return;
  state.periods = state.periods.filter(x => x.id !== p.id);
  curId = state.periods.length ? state.periods[0].id : null;
  saveState(); render();
}

function setDay(pid, day, field, val){ const p=state.periods.find(x=>x.id===pid); if(!p)return; p.days[day][field]=num(val); saveState(); render(); }
function addExpense(pid){ const p=state.periods.find(x=>x.id===pid); if(!p)return; p.expenses.push({id:Date.now(),name:'',amount:0}); saveState(); render(); }
function setExpenseName(pid, eid, val){ const p=state.periods.find(x=>x.id===pid); if(!p)return; const e=p.expenses.find(x=>x.id===eid); if(e){e.name=val; saveState();} }
function setExpenseAmt(pid, eid, val){ const p=state.periods.find(x=>x.id===pid); if(!p)return; const e=p.expenses.find(x=>x.id===eid); if(e){e.amount=num(val); saveState(); render();} }
function removeExpense(pid, eid){ const p=state.periods.find(x=>x.id===pid); if(!p)return; p.expenses=p.expenses.filter(x=>x.id!==eid); saveState(); render(); }

loadLocal();
render();
loadCloud();
</script>
